<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background fills the full 128x128 with a small corner radius so the
       glyph occupies as much of the toolbar slot as possible. -->
  <rect width="128" height="128" rx="18" fill="#1a1a2e"/>

  <!-- Head -->
  <circle cx="64" cy="40" r="24" fill="none" stroke="#4CAF50" stroke-width="8"/>
  <circle cx="64" cy="40" r="10" fill="#4CAF50"/>

  <!-- Spine -->
  <line x1="64" y1="66" x2="64" y2="110" stroke="#4CAF50" stroke-width="8" stroke-linecap="round"/>

  <!-- Legs -->
  <line x1="64" y1="88" x2="32" y2="114" stroke="#4CAF50" stroke-width="7" stroke-linecap="round"/>
  <line x1="64" y1="88" x2="96" y2="114" stroke="#4CAF50" stroke-width="7" stroke-linecap="round"/>

  <!-- Antennae / signal arms -->
  <line x1="42" y1="66" x2="16" y2="48" stroke="#4CAF50" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="86" y1="66" x2="112" y2="48" stroke="#4CAF50" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
</svg>
