<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      /* Neutral grayscale palette */
      --bg: #18181b;
      --surface: #27272a;
      --surface-hover: #3f3f46;
      --border: #3f3f46;
      --text: #fafafa;
      --text-dim: #a1a1aa;
      --text-mute: #71717a;

      /* Functional colors */
      --success: #22c55e;
      --success-glow: rgba(34, 197, 94, 0.45);
      --danger: #ef4444;
      --warning: #f59e0b;
      --warning-glow: rgba(245, 158, 11, 0.5);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-mute);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .status-dot.connected {
      background: var(--success);
      box-shadow: 0 0 8px var(--success-glow);
    }
    .status-dot.connecting {
      background: var(--warning);
      box-shadow: 0 0 8px var(--warning-glow);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    .status-text {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      width: 100%;
      padding: 10px;
      border: 1px solid transparent;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .btn-connect    { background: var(--success); color: #0b0b0d; }
    .btn-disconnect { background: var(--danger);  color: #fff; }
    .btn-secondary  {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-secondary:hover { background: var(--surface-hover); }
    .btn-connect:hover, .btn-disconnect:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .info {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 12px;
      padding: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      line-height: 1.4;
    }
    .info-label {
      flex: 0 0 auto;
      width: 54px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      font-size: 10px;
    }
    .info-value {
      flex: 1 1 auto;
      min-width: 0;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 11px;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot" id="statusDot"></div>
    <h1>Hermes Bridge</h1>
  </div>
  <div class="status-text" id="statusText">Disconnected</div>

  <div class="actions">
    <button class="btn btn-connect"           id="btnConnect">Connect to Hermes</button>
    <button class="btn btn-disconnect hidden" id="btnDisconnect">Disconnect</button>
    <button class="btn btn-secondary"         id="btnShow">Show Agent Window</button>
    <button class="btn btn-secondary"         id="btnRefresh">Refresh</button>
  </div>

  <div class="info" id="info">
    <div class="info-row">
      <span class="info-label">Bridge</span>
      <span class="info-value" id="infoBridge" title="ws://127.0.0.1:9393">ws://127.0.0.1:9393</span>
    </div>
    <div class="info-row">
      <span class="info-label">Window</span>
      <span class="info-value" id="infoWindow">—</span>
    </div>
    <div class="info-row">
      <span class="info-label">URL</span>
      <span class="info-value" id="infoUrl">—</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
